apiVersion: 1

groups:
  - orgId: 1
    name: backend-key-metrics
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: backend_down
        title: Backend Down
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: 1 - up{job="appointment-mng-backend"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: Backend indisponível
          description: O target appointment-mng-backend não responde há pelo menos 2 minutos.
        labels:
          severity: critical
          team: backend

      - uid: backend_p95_latency_high
        title: High P95 Latency
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="appointment-mng-backend"}[5m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Latência P95 acima do limite
          description: A latência P95 está acima de 1s por pelo menos 5 minutos.
        labels:
          severity: warning
          team: backend

      - uid: backend_5xx_error_rate_high
        title: High 5xx Error Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: sum(rate(http_requests_total{job="appointment-mng-backend",status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total{job="appointment-mng-backend"}[5m])), 0.001)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Taxa de erro 5xx elevada
          description: A taxa de respostas 5xx está acima de 5% por pelo menos 5 minutos.
        labels:
          severity: warning
          team: backend
